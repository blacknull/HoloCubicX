; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitm-1]
platform = espressif32@~6.4.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
;monitor_port = auto  ; 自动检测端口
monitor_dtr = 0      ; 禁用DTR自动复位
monitor_rts = 0      ; 禁用RTS自动复位
monitor_filters =    ; 添加过滤器处理连接问题
    time
    esp32_exception_decoder
    ;log2file

;upload_port = COM5
upload_speed = 115200
upload_resetmethod = default
upload_flags =
    --before=default_reset
    --after=hard_reset

;debug_tool = esp-builtin
;debug_init_break = break setup ; 在setup()中设置断点，开了之后初始化会很卡
;build_type = debug
;debug_speed = 20000 ; KHz。如果 CPU 80 MHz 运行，则 JTAG 频率的上限为 20 MHz；如果 CPU 以 160 MHz 或者 240 MHz，则上限为 26 MHz。

build_flags =
	-D BOARD_HAS_PSRAM

	;-D USE_DMA=0
	;-D CONFIG_DISABLE_HAL_LOCKS=1
	-D CONFIG_ARDUHAL_LOG_COLORS=0
    -D CORE_DEBUG_LEVEL=3      ; 日志级别：2-WARN,3-INFO,4-DEBUG
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	;-D UART_LOG_PRINT_EN=0			;0的时候从USB输出【debug代码时候】，1的时候debug信息从串口输出【release代码时候】
	;-D USE_SD_MMC=1				;使能使用SM_MMC，屏蔽使用SPI
	;-D DISABLE_ALL_LIBRARY_WARNINGS		;禁止TFT_eSPI库编译警告

	; ------------------------------------------------------------------
	; LVGL 配置
	;   lv_conf.h 放在 include/ 下。
	;   -I include 显式把 include/ 加入编译器 include path（PlatformIO 默认
	;   只对主工程添加，需要显式传给 lvgl 库的编译）。
	;   LV_CONF_INCLUDE_SIMPLE 让 lvgl 源码中用 #include "lv_conf.h" 即可找到。
	; ------------------------------------------------------------------
	-I include
	-D LV_CONF_INCLUDE_SIMPLE

	; ------------------------------------------------------------------
	; TFT_eSPI 配置（对应原 User_Setups/Setup24_ST7789.h）
	;   USER_SETUP_LOADED=1 跳过库内自带的 User_Setup_Select，
	;   所有配置通过 -D 宏定义在此维护，库保持原样便于后续升级。
	; ------------------------------------------------------------------
	-D USER_SETUP_LOADED=1
	-D ST7789_DRIVER
	-D TFT_WIDTH=240
	-D TFT_HEIGHT=280
	-D CGRAM_OFFSET
	-D TFT_RGB_ORDER=TFT_BGR
	-D TFT_INVERSION_ON
	-D ESP32_DMA
	-D TFT_MISO=-1
	-D TFT_MOSI=18
	-D TFT_SCLK=8
	-D TFT_CS=15
	-D TFT_DC=17
	-D TFT_RST=16
	-D TFT_BL=21
	-D TFT_BACKLIGHT_ON=HIGH
	-D LOAD_GLCD
	-D LOAD_FONT2
	-D LOAD_FONT4
	-D LOAD_FONT6
	-D LOAD_FONT7
	-D LOAD_FONT8
	-D LOAD_GFXFF
	-D SMOOTH_FONT
	-D SPI_FREQUENCY=40000000
	-D SPI_READ_FREQUENCY=6000000

board_build.flash_mode = qio
board_build.f_flash = 80000000L

board_build.psram_type = opi
board_build.boot=qio
board_build.arduino.memory_type=qio_opi

;board_build.partitions = large_spiffs_16MB.csv
board_upload.flash_size = 16MB



